name: Build and Deploy praise-ml

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-endpoint:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy or update HF Inference Endpoint
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          echo "Checking for existing endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.endpoints.huggingface.cloud/v2/endpoint/ADGIT/praise-ml \
            -H "Authorization: Bearer $HF_TOKEN")
          
          if [ "$STATUS" = "200" ]; then
            echo "Updating existing endpoint with new image..."
            curl -s -X PUT \
              https://api.endpoints.huggingface.cloud/v2/endpoint/ADGIT/praise-ml \
              -H "Authorization: Bearer $HF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"model\": {
                  \"repository\": \"ADGIT/praise-ml-handler\",
                  \"task\": \"custom\",
                  \"framework\": \"pytorch\"
                },
                \"custom_image\": {
                  \"url\": \"${IMAGE_TAG}\",
                  \"health_route\": \"/health\",
                  \"port\": 8000,
                  \"env\": {
                    \"ASR_MODEL\": \"openai/whisper-large-v3\",
                    \"DIARIZATION_MODEL\": \"pyannote/speaker-diarization-community-1\",
                    \"ASSISTANT_MODEL\": \"distil-whisper/distil-large-v3\"
                  }
                }
              }"
          else
            echo "Creating new endpoint..."
            curl -s -X POST \
              https://api.endpoints.huggingface.cloud/v2/endpoint/ADGIT \
              -H "Authorization: Bearer $HF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"compute\": {
                  \"accelerator\": \"gpu\",
                  \"instanceSize\": \"x1\",
                  \"instanceType\": \"nvidia-t4\",
                  \"scaling\": {
                    \"maxReplica\": 1,
                    \"minReplica\": 0
                  }
                },
                \"model\": {
                  \"repository\": \"ADGIT/praise-ml-handler\",
                  \"task\": \"custom\",
                  \"framework\": \"pytorch\"
                },
                \"custom_image\": {
                  \"url\": \"${IMAGE_TAG}\",
                  \"health_route\": \"/health\",
                  \"port\": 8000,
                  \"env\": {
                    \"ASR_MODEL\": \"openai/whisper-large-v3\",
                    \"DIARIZATION_MODEL\": \"pyannote/speaker-diarization-community-1\",
                    \"ASSISTANT_MODEL\": \"distil-whisper/distil-large-v3\"
                  }
                },
                \"secrets\": {
                  \"HF_TOKEN\": \"${HF_TOKEN}\"
                },
                \"name\": \"praise-ml\",
                \"provider\": {
                  \"region\": \"us-east-1\",
                  \"vendor\": \"aws\"
                },
                \"type\": \"private\"
              }"
          fi
          echo ""
          echo "Deploy step complete."
