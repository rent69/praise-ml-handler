name: Build and Deploy praise-ml

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-endpoint:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to HF Inference Endpoint
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Use sha-<7chars> tag from Docker metadata action
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          # Extract 7-char SHA (matches Docker metadata type=sha format)
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          FULL_IMAGE="ghcr.io/rent69/praise-ml-handler:sha-${SHORT_SHA}"
          echo "Deploying image: ${FULL_IMAGE}"
          
          # Update endpoint with new image — uses model.image.custom format
          # Model defaults (ASR_MODEL, DIARIZATION_MODEL) come from Dockerfile,
          # NOT from HF env vars — this avoids stale overrides.
          RESULT=$(curl -s -X PUT \
            https://api.endpoints.huggingface.cloud/v2/endpoint/ADGIT/praise-ml \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": {
                \"image\": {
                  \"custom\": {
                    \"url\": \"${FULL_IMAGE}\",
                    \"healthRoute\": \"/health\",
                    \"port\": 8000
                  }
                }
              }
            }")
          
          STATE=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',{}).get('state','unknown'))" 2>/dev/null || echo "parse_error")
          echo "Endpoint state: ${STATE}"
          echo "Deploy complete."
